<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Rapidoo</title>
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script type="module" src="app.js"></script>
</head>
<body>
    <header>
        <a href="index.html" class="logo">
            <i class="fa-solid fa-motorcycle"></i>
            Rapidoo
        </a>
        <nav>
            <a href="index.html" class="active">Login</a>
            <a href="register.html" class="btn-primary">Sign Up</a>
        </nav>
    </header>

    <main>
        <div class="form-container">
            <div class="form-header">
                <h2>Welcome Back</h2>
                <p>Enter your details to access your account.</p>
            </div>
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn">Login Securely</button>
            </form>
            <div class="links">
                <p>New to Rapidoo? <a href="register.html">Create an account</a></p>
            </div>
        </div>
    </main>
</body>
</html>
